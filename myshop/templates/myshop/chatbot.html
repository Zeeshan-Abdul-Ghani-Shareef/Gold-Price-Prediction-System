{% extends './master4.html' %}
{% load static %}
{% block body %}
   
  <!-- Breadcrumbs Area Start -->
        <div class="breadcrumbs-area2">
			<div class="container">
				<div class="row">
					<div class="col-md-12">
						<h2>AI Based Gold Marketplace Chatbot</h2>
					</div>
				</div>
			</div>
		</div>
       <div class="ltn__breadcrumb-area text-left bg-overlay-white-30 bg-image " data-bs-bg="{% static 'img/bg/19.jpg' %}">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="ltn__breadcrumb-inner">
                    <h1 class="page-title"></h1>
                    <div class="ltn__breadcrumb-list">
                        <ul>
                            <li><a href="\myshop\index"><span class="ltn__secondary-color"><i class="fas fa-home"></i></span> </a></li>
                            <li></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Chat Interface -->
<div class="container my-5">
    <div class="chat-container" id="chat-container">
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input-area">
            <textarea id="user-input" placeholder="Ask about properties, locations, or prices..." rows="1"></textarea>
            <button id="send-btn" class="btn theme-btn-1 btn-effect-1">Send</button>
        </div>
    </div>
</div>

<style>
.chat-container {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    max-width: 800px;
    margin: auto;
    background-color: #fff;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
}
.chat-box {
    height: 400px;
    overflow-y: scroll;
    padding: 10px;
    background-color: #f7f7f7;
    margin-bottom: 10px;
    border-radius: 5px;
}
.chat-box div {
    margin-bottom: 12px;
}
.user-msg {
    text-align: right;
    background-color: #e1ffc7;
    padding: 10px;
    border-radius: 8px;
    display: inline-block;
    max-width: 80%;
}
.bot-msg {
    text-align: left;
    background-color: #ffffff;
    padding: 10px;
    border-radius: 8px;
    display: inline-block;
    max-width: 80%;
    border: 1px solid #ddd;
}
.chat-input-area {
    display: flex;
    gap: 10px;
}
.chat-input-area textarea {
    flex: 1;
    resize: none;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
}
#send-btn {
    padding: 8px 20px;
}
</style>

<script>
document.getElementById("send-btn").addEventListener("click", function () {
    const userInput = document.getElementById("user-input").value.trim();
    if (!userInput) return;

    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class="user-msg"><strong>You:</strong> ${userInput}</div>`;

    fetch("{% url 'chat_api' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({ message: userInput })
    })
    .then(response => response.json())
    .then(data => {
        chatBox.innerHTML += `<div class="bot-msg"><strong>Bot:</strong> ${data.response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        document.getElementById("user-input").value = "";
    })
    .catch(error => {
        chatBox.innerHTML += `<div class="bot-msg"><strong>Bot:</strong> Error occurred. Try again.</div>`;
    });
});
</script>
{% endblock %}
